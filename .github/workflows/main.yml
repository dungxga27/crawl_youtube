name: youtube monitor

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: install python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: install deps
        run: pip install requests
      - name: run script
        run: python youtube_monitor.py
